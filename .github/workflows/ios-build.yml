name: iOS Build & IPA

# Builds the PrismMusic iOS app and produces:
#   1. An unsigned .ipa file (for sideloading via AltStore / Sideloadly / TrollStore)
#   2. A simulator .app bundle (for testing on Mac)
#
# No Apple Developer account is required. The .ipa is unsigned —
# sign it locally with AltStore, Sideloadly, or your own certificate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ipa:
    name: Build IPA (unsigned)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      # ── Locate project ────────────────────────────────────────────
      - name: Locate iOS project root
        id: locate_project
        run: |
          if [ -f project.yml ]; then
            ROOT="."
          else
            ROOT=$(find . -maxdepth 3 -name project.yml -not -path './.git/*' -print -quit | xargs -n1 dirname || true)
          fi
          if [ -z "$ROOT" ] || [ ! -f "$ROOT/project.yml" ]; then
            echo "::error::project.yml not found anywhere in the repo."
            find . -maxdepth 3 -type f -name '*.yml' -not -path './.git/*'
            exit 1
          fi
          echo "Found iOS project at: $ROOT"
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"

      # ── XcodeGen ──────────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: xcodegen generate

      # ── Resolve SPM deps ──────────────────────────────────────────
      - name: Resolve Swift Package dependencies
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PrismMusic.xcodeproj \
            -scheme PrismMusic

      # ── Archive for device (unsigned) ─────────────────────────────
      - name: Archive for iOS device
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project PrismMusic.xcodeproj \
            -scheme PrismMusic \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/PrismMusic.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            -quiet

      # ── Create .ipa from archive ─────────────────────────────────
      # An .ipa is simply a zip with a Payload/ folder containing the .app.
      # Since we're unsigned, we skip `xcodebuild -exportArchive` (which
      # requires signing) and build the .ipa manually.
      - name: Create unsigned IPA
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          ARCHIVE_APP="build/PrismMusic.xcarchive/Products/Applications/PrismMusic.app"
          if [ ! -d "$ARCHIVE_APP" ]; then
            echo "::error::PrismMusic.app not found in archive."
            echo "Archive contents:"
            find build/PrismMusic.xcarchive -type d -name '*.app' || true
            exit 1
          fi

          # Build Payload structure
          mkdir -p build/Payload
          cp -R "$ARCHIVE_APP" build/Payload/

          # Remove code signature directory (if any leftover)
          find build/Payload -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true

          # Zip into .ipa
          cd build
          zip -ry "$GITHUB_WORKSPACE/PrismMusic-unsigned.ipa" Payload/
          ls -lh "$GITHUB_WORKSPACE/PrismMusic-unsigned.ipa"

          echo "✅ IPA created successfully!"

      # ── Upload IPA artifact ──────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PrismMusic-IPA-${{ github.sha }}
          path: PrismMusic-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

  # ── Simulator build (for verification) ───────────────────────────
  build-simulator:
    name: Build (Simulator)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate iOS project root
        id: locate_project
        run: |
          if [ -f project.yml ]; then
            ROOT="."
          else
            ROOT=$(find . -maxdepth 3 -name project.yml -not -path './.git/*' -print -quit | xargs -n1 dirname || true)
          fi
          if [ -z "$ROOT" ] || [ ! -f "$ROOT/project.yml" ]; then
            echo "::error::project.yml not found."
            exit 1
          fi
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: xcodegen generate

      - name: Resolve dependencies
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PrismMusic.xcodeproj \
            -scheme PrismMusic

      - name: Build for iOS Simulator
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project PrismMusic.xcodeproj \
            -scheme PrismMusic \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -quiet

      - name: Locate and package .app
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          APP_PATH=$(find build/Build/Products -type d -name 'PrismMusic.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::PrismMusic.app not found in build output."
            exit 1
          fi
          APP_DIR=$(dirname "$APP_PATH")
          cd "$APP_DIR"
          zip -ry "$GITHUB_WORKSPACE/PrismMusic-Simulator.zip" PrismMusic.app

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrismMusic-Simulator-${{ github.sha }}
          path: PrismMusic-Simulator.zip
          if-no-files-found: error
          retention-days: 14
