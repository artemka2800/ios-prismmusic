name: iOS Build

# Builds the PrismMusic iOS app and produces an unsigned simulator-compatible
# `.app` bundle as a downloadable artifact.
#
# We can't ship a real `.ipa` from CI without an Apple Developer account
# (signing certificate + provisioning profile must be uploaded as repo
# secrets). What we DO produce here is enough to:
#   - verify the project compiles
#   - install on iOS Simulator (drag-and-drop)
#   - serve as input for AltStore / Sideloadly resigning on the user's Mac

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel a running build when a fresh commit lands.
concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Simulator, unsigned)
    # macos-15 runners come with Xcode 16.x preinstalled which gives us the
    # iOS 18 SDK while still supporting our iOS 17 deployment target.
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      # Locate the Swift project. Two possible layouts:
      #   (a) repo root IS the iOS project (project.yml at top level)
      #   (b) the iOS project lives in `IOS-PrismMusic/` (or any other
      #       single sub-folder containing project.yml)
      - name: Locate iOS project root
        id: locate_project
        run: |
          if [ -f project.yml ]; then
            ROOT="."
          else
            ROOT=$(find . -maxdepth 3 -name project.yml -not -path './.git/*' -print -quit | xargs -n1 dirname || true)
          fi
          if [ -z "$ROOT" ] || [ ! -f "$ROOT/project.yml" ]; then
            echo "::error::project.yml not found anywhere in the repo."
            echo "Tree:"
            find . -maxdepth 3 -type f -name '*.yml' -not -path './.git/*'
            exit 1
          fi
          echo "Found iOS project at: $ROOT"
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"

      # XcodeGen turns project.yml into a real .xcodeproj on the fly. Keeps
      # the repo free of the noisy generated `project.pbxproj` file.
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: xcodegen generate

      # Resolve SPM dependencies once so the build step doesn't have to
      # network out (we don't currently have any, but this is harmless and
      # safer for future deps).
      - name: Resolve Swift Package dependencies
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PrismMusic.xcodeproj \
            -scheme PrismMusic

      - name: Build for iOS Simulator
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project PrismMusic.xcodeproj \
            -scheme PrismMusic \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -quiet

      # Locate the produced .app bundle so we can upload it. The path
      # varies between Xcode versions, hence the find.
      - name: Locate built .app bundle
        id: locate_app
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          APP_PATH=$(find build/Build/Products -type d -name 'PrismMusic.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::PrismMusic.app not found in build output."
            find build -type d -name '*.app' || true
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          # Resolve to an absolute path so the next step can move it.
          ABS_APP_PATH=$(cd "$(dirname "$APP_PATH")" && pwd)/$(basename "$APP_PATH")
          echo "app_path=$ABS_APP_PATH" >> "$GITHUB_OUTPUT"

      # Zip the .app — GitHub artifact uploader doesn't preserve macOS
      # bundle metadata otherwise (it would flatten Contents/* directories).
      - name: Package .app
        run: |
          APP_DIR=$(dirname '${{ steps.locate_app.outputs.app_path }}')
          cd "$APP_DIR"
          zip -ry "$GITHUB_WORKSPACE/PrismMusic-Simulator.zip" PrismMusic.app
          ls -la "$GITHUB_WORKSPACE/PrismMusic-Simulator.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrismMusic-Simulator-${{ github.sha }}
          path: PrismMusic-Simulator.zip
          if-no-files-found: error
          retention-days: 14
