name: iOS Build & IPA

# Builds the PrismMusic iOS app and produces:
#   1. An unsigned .ipa file (for sideloading via AltStore / Sideloadly / TrollStore)
#   2. A simulator .app bundle (for testing on Mac)
#
# No Apple Developer account is required. The .ipa is unsigned —
# sign it locally with AltStore, Sideloadly, or your own certificate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ipa:
    name: Build IPA (unsigned)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 beta
        run: |
          # Use the latest Xcode 26 beta available on the runner.
          XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE26" ]; then
            XCODE26=$(ls -d /Applications/Xcode-beta.app 2>/dev/null | head -1)
          fi
          if [ -z "$XCODE26" ]; then
            echo "::error::Xcode 26 beta not found on this runner."
            echo "Available Xcode versions:"
            ls -d /Applications/Xcode*.app 2>/dev/null || true
            exit 1
          fi
          echo "Selecting $XCODE26"
          sudo xcode-select -s "$XCODE26"

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      # ── Locate project ────────────────────────────────────────────
      - name: Locate iOS project root
        id: locate_project
        run: |
          if [ -f project.yml ]; then
            ROOT="."
          else
            ROOT=$(find . -maxdepth 3 -name project.yml -not -path './.git/*' -print -quit | xargs -n1 dirname || true)
          fi
          if [ -z "$ROOT" ] || [ ! -f "$ROOT/project.yml" ]; then
            echo "::error::project.yml not found anywhere in the repo."
            find . -maxdepth 3 -type f -name '*.yml' -not -path './.git/*'
            exit 1
          fi
          echo "Found iOS project at: $ROOT"
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"

      # ── XcodeGen ──────────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: xcodegen generate

      # ── Resolve SPM deps ──────────────────────────────────────────
      - name: Resolve Swift Package dependencies
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PrismMusic.xcodeproj \
            -scheme PrismMusic

      # ── Build for device (ad-hoc signed) ─────────────────────────
      # Xcode ad-hoc signs with "-" identity — no certificate needed.
      # This creates valid Mach-O signature headers that AltStore can parse.
      # AltStore replaces the signature when it installs.
      - name: Build for iOS device
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project PrismMusic.xcodeproj \
            -scheme PrismMusic \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -quiet

      # ── Locate the .app ──────────────────────────────────────────
      - name: Locate built .app bundle
        id: locate_app
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          APP_PATH=$(find build/Build/Products -type d -name 'PrismMusic.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::PrismMusic.app not found in build output."
            echo "Build products tree:"
            find build/Build/Products -type d -maxdepth 4 || true
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      # ── Create IPA — MINIMAL approach ────────────────────────────
      # NO stripping, NO plist conversion, NO re-signing.
      # Just: .app → Payload/ → zip. AltStore handles the rest.
      - name: Create IPA
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          APP_PATH="${{ steps.locate_app.outputs.app_path }}"

          mkdir -p build/ipa-staging/Payload
          cp -R "$APP_PATH" build/ipa-staging/Payload/

          echo "Bundle contents:"
          ls -la build/ipa-staging/Payload/PrismMusic.app/
          echo ""
          echo "Frameworks:" && ls build/ipa-staging/Payload/PrismMusic.app/Frameworks/ 2>/dev/null || echo "(none)"
          echo "PlugIns:" && ls build/ipa-staging/Payload/PrismMusic.app/PlugIns/ 2>/dev/null || echo "(none)"
          echo ""

          # Verify code signature
          codesign -dvv build/ipa-staging/Payload/PrismMusic.app 2>&1 || echo "(no signature)"
          echo ""

          cd build/ipa-staging
          zip -ry "$GITHUB_WORKSPACE/PrismMusic-unsigned.ipa" Payload/
          ls -lh "$GITHUB_WORKSPACE/PrismMusic-unsigned.ipa"

      # ── Verify IPA structure ──────────────────────────────────────
      - name: Verify IPA contents
        run: |
          echo "=== IPA file size ==="
          ls -lh PrismMusic-unsigned.ipa

          echo ""
          echo "=== IPA contents (top-level) ==="
          unzip -l PrismMusic-unsigned.ipa | head -40

          echo ""
          echo "=== Checking required files ==="

          unzip -l PrismMusic-unsigned.ipa | grep -q "Payload/PrismMusic.app/" \
            && echo "✅ Payload/PrismMusic.app/ present" \
            || { echo "❌ Missing Payload/PrismMusic.app/"; exit 1; }

          unzip -l PrismMusic-unsigned.ipa | grep -q "Payload/PrismMusic.app/Info.plist" \
            && echo "✅ Info.plist present" \
            || { echo "❌ Missing Info.plist"; exit 1; }

          unzip -l PrismMusic-unsigned.ipa | grep -q "Payload/PrismMusic.app/PrismMusic$" \
            && echo "✅ Main binary present" \
            || { echo "❌ Missing main binary"; exit 1; }

          echo ""
          echo "=== Binary architecture ==="
          mkdir -p /tmp/ipa-verify
          unzip -o PrismMusic-unsigned.ipa "Payload/PrismMusic.app/PrismMusic" -d /tmp/ipa-verify
          file /tmp/ipa-verify/Payload/PrismMusic.app/PrismMusic
          lipo -info /tmp/ipa-verify/Payload/PrismMusic.app/PrismMusic 2>/dev/null || true

          echo ""
          echo "=== Info.plist ==="
          unzip -o PrismMusic-unsigned.ipa "Payload/PrismMusic.app/Info.plist" -d /tmp/ipa-verify
          plutil -p /tmp/ipa-verify/Payload/PrismMusic.app/Info.plist | head -20 || true

          echo ""
          echo "✅ IPA verification passed!"

      # ── Upload IPA artifact ──────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PrismMusic-IPA-${{ github.sha }}
          path: PrismMusic-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

  # ── Simulator build (for verification) ───────────────────────────
  build-simulator:
    name: Build (Simulator)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 beta
        run: |
          XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE26" ]; then
            XCODE26=$(ls -d /Applications/Xcode-beta.app 2>/dev/null | head -1)
          fi
          if [ -z "$XCODE26" ]; then
            echo "::error::Xcode 26 beta not found on this runner."
            ls -d /Applications/Xcode*.app 2>/dev/null || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE26"

      - name: Locate iOS project root
        id: locate_project
        run: |
          if [ -f project.yml ]; then
            ROOT="."
          else
            ROOT=$(find . -maxdepth 3 -name project.yml -not -path './.git/*' -print -quit | xargs -n1 dirname || true)
          fi
          if [ -z "$ROOT" ] || [ ! -f "$ROOT/project.yml" ]; then
            echo "::error::project.yml not found."
            exit 1
          fi
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: xcodegen generate

      - name: Resolve dependencies
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PrismMusic.xcodeproj \
            -scheme PrismMusic

      - name: Build for iOS Simulator
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project PrismMusic.xcodeproj \
            -scheme PrismMusic \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -quiet

      - name: Locate and package .app
        working-directory: ${{ steps.locate_project.outputs.root }}
        run: |
          APP_PATH=$(find build/Build/Products -type d -name 'PrismMusic.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::PrismMusic.app not found in build output."
            exit 1
          fi
          APP_DIR=$(dirname "$APP_PATH")
          cd "$APP_DIR"
          zip -ry "$GITHUB_WORKSPACE/PrismMusic-Simulator.zip" PrismMusic.app

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrismMusic-Simulator-${{ github.sha }}
          path: PrismMusic-Simulator.zip
          if-no-files-found: error
          retention-days: 14
