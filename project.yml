# XcodeGen specification for PrismMusic.
# Generate with: `xcodegen generate` (on macOS, after `brew install xcodegen`).
#
# Two targets:
#   1. PrismMusic               — main iOS app
#   2. PrismMusicLiveActivity   — widget extension hosting the Live Activity + Dynamic Island UI

name: PrismMusic
options:
  bundleIdPrefix: com.prism.music
  deploymentTarget:
    iOS: "17.0"            # Requires iOS 26+ for native Liquid Glass `.glassEffect()`.
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: ""            # set in Xcode → Signing & Capabilities
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: targeted
    GENERATE_INFOPLIST_FILE: NO
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  PrismMusic:
    type: application
    platform: iOS
    entitlements:
      path: PrismMusic/PrismMusic.entitlements
    sources:
      - path: PrismMusic
        excludes:
          - "**/*.md"
    resources:
      - path: PrismMusic/Assets.xcassets
        optional: true
    dependencies:
      - target: PrismMusicWidget
        embed: true
    info:
      path: PrismMusic/Info.plist
      properties:
        CFBundleDisplayName: PrismMusic
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIBackgroundModes:
          - audio
        NSMotionUsageDescription: "Требуется для параллакс-эффекта обложек при наклоне устройства."
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          # Allows hitting a local dev server (e.g. http://192.168.x.x:3000) without HTTPS.
          # In production you should ship the app pointing to an HTTPS-only host and remove this exception.
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prism.music.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  PrismMusicWidget:
    type: app-extension
    platform: iOS
    subtype: widgetkit-extension
    entitlements:
      path: PrismMusicWidget/PrismMusicWidget.entitlements
    sources:
      - path: PrismMusicWidget
        excludes:
          - "**/*.md"
    info:
      path: PrismMusicWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        CFBundleDisplayName: PrismMusicWidget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prism.music.app.PrismMusicWidget
        TARGETED_DEVICE_FAMILY: "1,2"
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

